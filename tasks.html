<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks - SoftGrid CRM</title>
<link rel="stylesheet" href="style.css?v=11">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head><body>
<div class="dashboard">
  <aside class="sidebar">
    <div class="logo">CRM</div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="customers.html">Customers</a>
      <a href="leads.html">Leads</a>
      <a href="employees.html">Employees</a>
      <a href="tasks.html" class="active">Tasks</a>
      <a href="index.html">Logout</a>

  </aside>
  <div class="main">
    <header class="topbar"><h2>Tasks</h2><a href="create-task.html" class="btn-primary">+ Create Task</a></header>

      <div class="task-grid">
        <div class="task-card">
          <div class="task-head"><h4>Follow up with TechSoft</h4><span class="priority high">HIGH</span></div>
          <p style="color:var(--muted);font-size:13px">Assignee: Ali Khan | Due: Oct 12</p>
          <div class="progress"><span style="width:60%"></span></div>
          <span class="badge inprogress">In Progress</span>
        </div>
        <div class="task-card">
          <div class="task-head"><h4>Update CRM Docs</h4><span class="priority low">LOW</span></div>
          <p style="color:var(--muted);font-size:13px">Assignee: Sara Ahmed | Due: Oct 15</p>
          <div class="progress"><span style="width:100%"></span></div>
          <span class="badge done">Done</span>
        </div>
      </div>
    </div>
  </div>
</div>
