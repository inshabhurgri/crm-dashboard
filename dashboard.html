<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title><link rel="stylesheet" href="assets/style.css"></head>
<body>
  <div class="dashboard">
    <aside class="sidebar">
      <h2>CRM</h2>
      <nav>
        <a href="#">Dashboard</a>
        <a href="#">Customers</a>
        <a href="#">Leads</a>
        <a href="#">Employees</a>
        <a href="#">Tasks</a>
      </nav>
    </aside>

    <main style="width:100%">
      <header class="topbar">
        <input class="search" placeholder="Search...">
        <div class="right">
          <span>🔔</span> 
          <div class="profile">👤 User ▼</div>
        </div>
      </header>

      <section class="content">
        <div class="stats">
          <div class="card"><h4>Total Customers</h4><h2>1,240</h2></div>
          <div class="card"><h4>Active Leads</h4><h2>312</h2></div>
          <div class="card"><h4>Employees</h4><h2>48</h2></div>
          <div class="card"><h4>Pending Tasks</h4><h2>19</h2></div>
        </div>
        <div class="card"><h3>Revenue Chart (UI Only)</h3><div class="chart-placeholder">Chart Placeholder</div></div>
        <div class="card" style="margin-top:16px;"><h3>Recent Activity</h3><p>Lead Ahmed added - 2h ago</p><p>Task completed by Sara - 5h ago</p></div>
      </section>
    </main>
  </div>
</body>
</html>
