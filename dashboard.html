<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">CRM</div>
      <nav class="nav">
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="#">Customers</a>
        <a href="#">Leads</a>
        <a href="#">Employees</a>
        <a href="#">Tasks</a>
        <a href="index.html">Logout</a>
      </nav>
    </aside>

    <main class="content">
      <header class="topbar">
        <h1>Dashboard</h1>
        <div class="right">
          <span>🔔</span> 
          <div class="profile">👤 User ▼</div>
        </div>
      </header>

      <section class="grid">
        <div class="kpi">
          <h3>Total Customers</h3>
          <p>1,240</p>
        </div>
        <div class="kpi">
          <h3>Active Leads</h3>
          <p>312</p>
        </div>
        <div class="kpi">
          <h3>Employees</h3>
          <p>48</p>
        </div>
        <div class="kpi">
          <h3>Pending Tasks</h3>
          <p>19</p>
        </div>
      </section>

      <div class="card"><h3>Revenue Chart (UI Only)</h3><div class="chart-placeholder">Chart Placeholder</div></div>
      <div class="card" style="margin-top:16px;"><h3>Recent Activity</h3><p>Lead Ahmed added - 2h ago</p><p>Task completed by Sara - 5h ago</p></div>
    </main>
  </div>
</body>
</html>
